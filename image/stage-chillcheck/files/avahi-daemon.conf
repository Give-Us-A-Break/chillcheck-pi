# ============================================================
# files/avahi-daemon.conf
# ============================================================
[server]
host-name=chillcheck
domain-name=local
use-ipv4=yes
use-ipv6=no
allow-interfaces=eth0,wlan0
ratelimit-interval-usec=1000000
ratelimit-burst=1000

[wide-area]
enable-wide-area=no

[publish]
publish-addresses=yes
publish-hinfo=yes
publish-workstation=yes
publish-domain=yes

[reflector]
enable-reflector=no

[rlimits]
